name: CI - fleetguard-frontend

on:
  push:
    branches: [main, develop, feature/**]
    paths:
      - 'fleetguard-frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'fleetguard-frontend/**'
      - '.github/workflows/ci-frontend.yml'

concurrency:
  group: fleetguard-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── 1. PRUEBAS UNITARIAS ────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: fleetguard-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fleetguard-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-unit
          path: fleetguard-frontend/coverage/
          retention-days: 7

  # ── 2. PRUEBAS DE INTEGRACIÓN ───────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: fleetguard-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fleetguard-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration

  # ── 3. BUILD NEXT.JS ────────────────────────────────────────────────────────
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    defaults:
      run:
        working-directory: fleetguard-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fleetguard-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: fleetguard-frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('fleetguard-frontend/package-lock.json') }}-${{ hashFiles('fleetguard-frontend/src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('fleetguard-frontend/package-lock.json') }}-

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_FLEET_SERVICE_URL: http://localhost:3001
          NEXT_PUBLIC_RULES_SERVICE_URL: http://localhost:3002

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: fleetguard-frontend/.next/
          retention-days: 7

  # ── 4. DOCKER BUILD ─────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./fleetguard-frontend
          file: ./fleetguard-frontend/Dockerfile
          push: false
          tags: mvpfleetguard-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_FLEET_SERVICE_URL=http://localhost:3001
            NEXT_PUBLIC_RULES_SERVICE_URL=http://localhost:3002