name: CD - Build & Push Docker Images

on:
  push:
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-jars:
    name: Build JARs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build fleet-service JAR
        run: mvn -pl fleet-service -am package -DskipTests -B

      - name: Build rules-alerts-service JAR
        run: mvn -pl rules-alerts-service -am package -DskipTests -B

      - name: Upload fleet-service JAR
        uses: actions/upload-artifact@v4
        with:
          name: fleet-service-jar
          path: fleet-service/target/*.jar
          retention-days: 1

      - name: Upload rules-alerts-service JAR
        uses: actions/upload-artifact@v4
        with:
          name: rules-alerts-service-jar
          path: rules-alerts-service/target/*.jar
          retention-days: 1

  push-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: build-jars

    steps:
      - uses: actions/checkout@v4

      - name: Download fleet-service JAR
        uses: actions/download-artifact@v4
        with:
          name: fleet-service-jar
          path: fleet-service/target/

      - name: Download rules-alerts-service JAR
        uses: actions/download-artifact@v4
        with:
          name: rules-alerts-service-jar
          path: rules-alerts-service/target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push fleet-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: fleet-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fleet-service:latest
            ${{ secrets.DOCKER_USERNAME }}/fleet-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push rules-alerts-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: rules-alerts-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/rules-alerts-service:latest
            ${{ secrets.DOCKER_USERNAME }}/rules-alerts-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./fleetguard-frontend
          file: fleetguard-frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fleetguard-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/fleetguard-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_FLEET_SERVICE_URL=http://localhost:3000/api/fleet
            NEXT_PUBLIC_RULES_SERVICE_URL=http://localhost:3000/api/rules
          cache-from: type=gha
          cache-to: type=gha,mode=max