name: CI - fleet-service

on:
  push:
    branches: [main, develop, feature/**]
    paths:
      - 'fleet-service/**'
      - 'pom.xml'
      - '.github/workflows/ci-fleet-service.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'fleet-service/**'
      - 'pom.xml'

concurrency:
  group: fleet-service-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Test
        run: mvn -pl fleet-service -am clean verify -B
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: fleet-service Tests
          path: fleet-service/target/surefire-reports/*.xml
          reporter: java-junit

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-fleet-service
          path: fleet-service/target/site/jacoco/
          retention-days: 7

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: fleet-service-jar
          path: fleet-service/target/*.jar
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: fleet-service-jar
          path: fleet-service/target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: fleet-service/Dockerfile
          push: false
          tags: mvpfleetguard-fleet-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max