spring:
  datasource:
    url: jdbc:tc:postgresql:15:///fleet_test_db
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-on-validation-error: true

  rabbitmq:
    host: localhost
    port: 5672

logging:
  level:
    root: WARN
    com.fleetguard: INFO