spring:
  application:
    name: rules-alerts-service

  datasource:
    url: jdbc:postgresql://localhost:5434/rules_alerts_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-on-validation-error: true
    validate-on-migrate: true

fleet:
  service:
    url: http://localhost:8082

logging:
  level:
    org.flywaydb: DEBUG

server:
  port: 8093